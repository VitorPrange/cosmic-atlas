<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="assets/css/astro-favorito.css">
</head>

<body>
    <table class="tabela-astros">
        <thead>
            <tr>
                <th></th>
                <th>Nome</th>
                <th>Distancia-Terra</th>
                <th>Tipo</th>
                <th>Temperatura média</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>
                    <img src="assets/imagens/marte-girando.gif" alt="Imagem Marte">
                </td>
                <td>
                    <div class="align">
                        Marte
                    </div>
                </td>
                <td>
                    <div class="align">
                        ~225 milhões km
                    </div>
                </td>
                <td>
                    <div class="align">
                        Rochoso
                    </div>
                </td>
                <td>
                    <div class="align">
                        -63 °C
                    </div>
                </td>
            </tr>
            <tr>
                <td>
                    <img src="assets/imagens/jupiter-girando.gif"
                        alt="Imagem Júpiter">
                </td>
                <td>
                    <div class="align">
                        Júpiter
                    </div>
                </td>
                <td>
                    <div class="align">
                        ~778 milhões km
                    </div>
                </td>
                <td>
                    <div class="align">
                        Gasoso
                    </div>
                </td>
                <td>
                    <div class="align">
                        -108 °C
                    </div>
                </td>
            </tr>
            <tr>
                <td>
                    <img src="assets/imagens/sol-girando.gif"
                        alt="Imagem Júpiter">
                </td>
                <td>
                    <div class="align">
                        Sol
                    </div>
                </td>
                <td>
                    <div class="align">
                        ~150 milhões km
                    </div>
                </td>
                <td>
                    <div class="align">
                        Estrela
                    </div>
                </td>
                <td>
                    <div class="align">
                        ~5.500 °C (superfície)
                    </div>
                </td>
            </tr>
            <tr>
                <td>
                    <img src="assets/imagens/buraco-negro-girando.gif"
                        alt="Imagem Sagittarius A*">
                </td>
                <td>
                    <div class="align">
                        Sagittarius A*
                    </div>
                </td>
                <td>
                    <div class="align">
                        ~26.000 anos-luz
                    </div>
                </td>
                <td>
                    <div class="align">
                        Buraco Negro
                    </div>
                </td>
                <td>
                    <div class="align">
                        Desconhecida
                    </div>
                </td>
            </tr>
        </tbody>
    </table>
</body>

</html>
