<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redefinir senha</title>
    <link rel="icon" type="image/png" href="assets/imagens/favicon.png">
    <link rel="stylesheet" href="assets/css/senha.css">
</head>
<body>

    <form action="index.html" method="get" class="login">
        <h1>Trocar Senha</h1>
        <hr>

        <label for="email" class="label">E-mail</label>
        <input type="email" name="email" id="email" placeholder="Email">

        <label for="cpf" class="label">CPF</label>
        <input type="text" name="cpf" id="cpf" placeholder="CPF">

        <label for="senha" class="label">Senha</label>
        <input type="password" name="senha" id="senha" placeholder="Senha">

        <label for="senhaconf" class="label">Confirmar Senha</label>
        <input type="password" name="senhaconf" id="senhaconf" placeholder="Confirmar Senha">

        <input type="submit" name="botao" id="button" value="Alterar Senha">
    </form>
    
</body>
</html>
