<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="icon" type="image/png" href="assets/imagens/favicon.png">
    <link rel="stylesheet" href="assets/css/index.css">
</head>

<body>

        <form action="home.html" method="get" class="login">
            <h1>Login</h1>
            <hr>

            <label for="email" class="label">E-mail</label>
            <input type="email" name="email" id="email" placeholder="Email" required>

            <label for="senha" class="label">Senha</label>
            <input type="password" name="senha" id="senha" placeholder="Senha" required>

            <input type="submit" name="botao" id="button" value="Login">

            <a href="esqueceu-senha.html" id="esqueci">Esqueci minha senha</a>
        </form>
        
</body>

</html>
